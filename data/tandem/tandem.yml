markdown: >-
  ## Overview


  Tandem is a virtual office designed specifically for hybrid and remote teams
  that crave real-time connection and spontaneous collaboration. With just one
  click, you can see who's online, what they're working on, and jump into a chat
  or project.


  ## Features


  - **Presence Awareness** - See who's online and available at a glance

  - **Activity Visibility** - Check what team members are working on in
  real-time

  - **One-Click Communication** - Instantly jump into conversations without
  scheduling

  - **Screen Sharing** - Share your screen for quick collaboration and feedback

  - **Spontaneous Collaboration** - Recreate the "tap on the shoulder" moments
  of office life

  - **Team Coordination** - Keep distributed teams aligned and connected
  throughout the workday

  - **Work Together, Wherever You Are** - Bridge the gap between remote and
  in-office team members


  ## Use Cases


  - Quick questions and clarifications

  - Pair programming and code reviews

  - Design feedback and iteration

  - Project coordination and status updates

  - Building team relationships across distances


  ## Pricing


  Pricing information is available on their website.
