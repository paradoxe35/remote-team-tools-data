markdown: >-
  ## Overview


  StreamYard is a browser-based studio for professional live streaming and
  recording, trusted by over 12 million creators. The platform enables users to
  create content for multiple destinations simultaneously, with an emphasis on
  simplicity and professional-quality output.


  ## Features


  - **Multi-Platform Streaming** - Live stream to Facebook, YouTube, LinkedIn,
  and other platforms simultaneously

  - **Video Recording** - Record high-quality videos for later use or editing

  - **Guest Management** - Easily invite and manage guests for interviews and
  collaborations

  - **Customizable Branding** - Add logos, backgrounds, and custom layouts to
  match your brand

  - **Scene Management** - Create and organize multiple scenes for professional
  presentations

  - **Chat Integration** - Display and engage with audience comments from
  multiple platforms

  - **Video Repurposing** - Create clips and highlights from your streams

  - **Webinar Hosting** - Professional webinar functionality with registration
  and engagement tools

  - **Podcast Recording** - Multi-guest podcast recording with separate audio
  tracks

  - **AI Clips** - AI-powered automatic clip generation from longer videos

  - **Browser-Based** - No software download required, works directly in your
  browser


  ## Use Cases


  - Content creation and broadcasting

  - Corporate webinars and virtual events

  - Educational livestreams

  - Podcast recording and distribution

  - Product launches and demonstrations

  - Team meetings and all-hands

  - Customer training sessions


  ## Pricing


  StreamYard offers a free tier to get started, with Core and Advanced paid
  plans available for additional features and capabilities.
