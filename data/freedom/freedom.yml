markdown: >-
  ## Overview


  Freedom is a cross-platform distraction blocker used by over 4 million people
  to maintain focus and reclaim time. With an App Store Editor's Choice Award
  and featured in The New Yorker, Wall Street Journal, and Wired, Freedom helps
  users gain an average of 2.5 hours of focused time daily.


  ## Features


  - **Cross-Device Syncing** - Block distractions simultaneously across all
  devices (Mac, Windows, iOS, Android, Chromebook, Linux)

  - **App & Website Blocking** - Restrict access to unlimited apps, websites, or
  the entire internet

  - **Advanced Scheduling** - Set advance and recurring schedules for automatic
  focus sessions

  - **Locked Mode** - Prevents quitting sessions early for added commitment and
  accountability

  - **Custom Blocklists** - Create unlimited custom lists or use preset
  distraction categories

  - **Ambient Focus Sounds** - Access café, library, office, and nature
  soundscapes plus optimized music for concentration

  - **Session Templates** - Save and reuse blocking configurations for different
  work contexts


  ## Research-Backed Results


  Studies from Carnegie Mellon, Microsoft, and other universities document:

  - 20-27% productivity improvement when using blocking tools

  - 96% of Freedom users report increased productivity

  - Average of 2.5+ hours of focused time gained daily


  ## Platform Support


  - Mac

  - Windows

  - iOS

  - Android

  - Chromebook

  - Linux


  ## Pricing


  - **Free Tier** - Limited features available at no cost

  - **Premium** - $39.99 annually (approximately one coffee per month)


  ## Recognition


  - App Store Editor's Choice Award

  - Featured in The New Yorker, Wall Street Journal, Wired, Business Insider
