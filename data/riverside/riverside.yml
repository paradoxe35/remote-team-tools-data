markdown: >-
  ## Overview


  Riverside.fm is a remote recording platform that makes it easy for podcasters
  and media companies to record remote interviews in studio quality. The
  platform captures up to 4K video and lossless WAV audio content locally on
  each device, ensuring optimal quality regardless of internet connectivity.


  ## Features


  ### Recording Quality

  - **4K Video Recording** - Capture ultra-high-definition video locally

  - **Lossless Audio** - Record WAV audio with no compression

  - **Local Recording** - Files record directly on devices, not over the
  internet

  - **Quality Guarantee** - Studio quality regardless of internet connection

  - **Separate Tracks** - Individual audio/video tracks for each participant

  - **Uncompressed Output** - Download raw files for maximum editing flexibility


  ### Remote Interview Capabilities

  - **Up to 9 Guests** - Host large panel discussions and interviews

  - **No Sign-Up Required** - Guests join without creating accounts

  - **Cross-Device Support** - Works on mobile and desktop devices

  - **Easy Invites** - Send direct links to guests

  - **In-Person + Remote** - Mix in-person and remote participants

  - **Screen Sharing** - Share screens during recordings


  ### Production Tools

  - **Automated Transcription** - AI-powered speech-to-text in multiple
  languages

  - **Audio/Video Editing** - Built-in editing tools

  - **Magic Clips** - AI identifies best moments and creates social clips

  - **Teleprompter** - On-screen script support during recording

  - **Post-Production Tools** - Complete editing suite included

  - **Multi-Track Export** - Download separate tracks for advanced editing


  ### Collaboration Features

  - **Live Streaming** - Stream directly to platforms while recording

  - **Producer Mode** - Control participant settings remotely

  - **Recording Studios** - Virtual rooms for recurring sessions

  - **Media Board** - Share images and videos during recording

  - **Chat** - Text chat during live sessions


  ### Content Creation

  - **Social Media Clips** - Auto-generate clips for social platforms

  - **Vertical Video** - Optimize for TikTok, Instagram, YouTube Shorts

  - **Subtitles** - Automatic subtitle generation

  - **Branding** - Add logos and custom branding

  - **Templates** - Pre-configured editing templates


  ## Use Cases


  - Remote podcast recording

  - Video podcast production

  - Remote interviews and conversations

  - Virtual events and webinars

  - Content creation for social media

  - Educational content recording

  - Panel discussions

  - Documentary interviews


  ## Key Benefits


  - Studio-quality recordings from anywhere

  - No expensive equipment needed

  - Easy for guests to join (no software installation)

  - Internet issues don't affect quality

  - Complete post-production suite included

  - Streamlined workflow from recording to publishing

  - Professional results without professional studio


  ## Pricing


  - **Free Plan** - Up to 2 hours recording/month, 720p video, 44.1 kHz audio

  - **Paid Plans** - Higher recording limits, 4K video, lossless audio, advanced
  features


  Free plan includes:

  - Unlimited video calling

  - 2 hours of recording time per month

  - 720p maximum video quality

  - 44.1 kHz audio quality


  ## Platform Availability


  - Web browser (no download required for hosts or guests)

  - Desktop applications

  - Mobile apps (iOS and Android)

  - Works across devices seamlessly


  ## Target Users


  - Podcasters (audio and video)

  - Content creators

  - Media companies

  - Journalists and interviewers

  - Educators and trainers

  - Marketers creating video content

  - Remote teams producing content
