markdown: >-
  ## Overview


  Clarityflow (formerly ZipMessage) is an all-in-one platform designed to help
  coaches run their entire business without using multiple disconnected tools.
  The platform enables asynchronous communication through video, audio, and text
  messaging while providing supporting features for payments, scheduling, and
  client management.


  ## Features


  - **Async Messaging** - Video, audio, and text communication in threaded
  conversations

  - **Payment Processing** - Integrated Stripe payment processing for services
  and products

  - **Calendar Scheduling** - Client booking system with automated scheduling

  - **Custom Forms** - Create assessments and questionnaires for client intake

  - **Reusable Templates** - Coaching templates and lesson library for efficient
  workflows

  - **Task Management** - Track client progress and assignments

  - **Interactive Courses** - Build courses with personalized learning paths

  - **Group Coaching** - Manage cohorts and group programs

  - **Workflow Automations** - Automate repetitive tasks and client
  communications

  - **Mobile Apps** - Native iOS and Android apps with built-in recording

  - **Custom Branding** - White-label with custom domain support

  - **Client Onboarding** - Structured onboarding flows for new clients

  - **Email Integration** - Communicate seamlessly with email notifications


  ## Benefits


  Replaces 7+ typical coaching tools that would normally cost $20-$100+ monthly
  each, consolidating everything into a single platform.


  ## Support


  - Personal onboarding assistance

  - Email support with 1-business-day response time

  - Optional "done-with-you" setup consulting


  ## Pricing


  Multiple plan tiers available. Visit their pricing page for current plans and
  pricing details.
