markdown: >-
  ## Overview


  Gather is a virtual office platform designed to help remote teams recreate the
  spontaneity and collaboration of physical office spaces in a digital
  environment. The platform uses customizable 2D spaces where team members can
  move around, interact, and collaborate naturally.


  ## Features


  - **Virtual Office Spaces** - Customizable digital workspaces where teams can
  see who's available and interact spontaneously

  - **Spatial Audio and Video** - Audio and video that gets louder as you get
  closer to colleagues, mimicking real-world interactions

  - **Meeting Rooms** - Dedicated spaces for focused discussions and
  presentations

  - **Screen Sharing** - Share your screen with nearby colleagues or in meeting
  rooms

  - **Interactive Objects** - Embed whiteboards, videos, and other tools
  directly into your virtual space

  - **Custom Spaces** - Design your office to match your team's culture and
  workflow

  - **Integrations** - Connect with calendar, Slack, and other productivity
  tools

  - **Event Hosting** - Host conferences, workshops, and social events in
  immersive virtual environments


  ## Pricing


  Gather offers a free tier for small teams. Paid plans are available with
  additional features and capacity. Visit their pricing page for current rates.
