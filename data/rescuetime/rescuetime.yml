markdown: >-
  ## Overview


  RescueTime is a rare five-star productivity tool (PCMag) that combines
  automatic time tracking with distraction management. With over 2 million users
  and 15+ years in business, it has logged 3 billion hours of work, helping
  individuals and teams understand and improve their productivity.


  ## Features


  ### RescueTime Focus

  - **Automatic Activity Tracking** - Monitor time spent across apps and
  websites without manual input

  - **Website and Application Blocking** - Block distracting sites and apps
  during focus sessions

  - **Personalized Goals and Alerts** - Set productivity goals and receive
  alerts when you're off track

  - **Productivity Reports** - Detailed analysis of work categories and time
  distribution

  - **Focus Sessions** - Schedule uninterrupted work periods with automatic
  distraction blocking


  ### RescueTime Timesheets

  - **Automated Project Tracking** - Automatically log time to projects and
  clients

  - **Smart Timesheet Generation** - Generate timesheets without manual time
  entry

  - **Billable Rates** - Set hourly rates for accurate client invoicing

  - **Team Calendar Views** - See team timelines and project allocation

  - **Offline Work Entry** - Log time for work done offline or away from
  computer


  ## Unique Positioning


  Unlike competitors, RescueTime "does it all" by combining both focus
  improvement and automated time tracking in one integrated platform—features
  that other tools don't bundle together.


  ## Platform Availability


  - Windows

  - Mac

  - Linux

  - iOS


  ## Pricing


  Free two-week trial available. Subscription required after trial period. Visit
  their website for current pricing.
