markdown: >-
  ## Overview


  Reclaim.ai is an AI-powered calendar application designed to automatically
  schedule work, meetings, and personal time while protecting focus time and
  promoting work-life balance. With 600,000+ users across 70,000 companies and a
  4.8-star G2 rating, Reclaim helps teams save an average of 7.6 hours per week
  through smarter scheduling.


  ## Features


  - **Focus Time Protection** - Automatically defends dedicated deep work
  periods from meeting encroachment

  - **AI Habits** - Creates recurring events that intelligently adapt to
  priority changes

  - **Task Scheduling** - Syncs tasks to calendar by priority before due dates

  - **Smart Meetings** - Finds optimal meeting times across all attendees'
  schedules

  - **Scheduling Links** - AI-powered alternative to Calendly with flexible,
  intelligent availability

  - **Calendar Sync** - Consolidates multiple calendars (work, personal) to
  prevent conflicts

  - **Buffer Time** - Automatically schedules breaks and travel time between
  events

  - **Time Tracking & Analytics** - Measures productivity metrics and meeting
  load

  - **Slack Status Integration** - Syncs calendar status to prevent
  interruptions during focus time

  - **Priority-Based Scheduling** - Automatically adjusts schedule based on task
  and meeting priorities


  ## Claimed Results


  - Save 7.6 hours per week through smarter scheduling

  - Defend 2.6+ lunches weekly with protected time blocks

  - 55.4% improved productivity through better time management


  ## Integrations


  - Google Calendar

  - Outlook Calendar

  - Slack

  - Zoom

  - Jira

  - Asana

  - ClickUp

  - Todoist

  - Linear


  ## Security & Compliance


  - SOC 2 Type II certified

  - Enterprise-grade security and privacy controls


  ## Pricing


  - **Lite Plan** - Free forever for individuals

  - **Starter Plan** - Premium features for power users

  - **Business Plan** - Team features and controls

  - **Enterprise** - Custom deployments with advanced team management


  *Current promotion: 30% discount for new users on Starter & Business plans*
